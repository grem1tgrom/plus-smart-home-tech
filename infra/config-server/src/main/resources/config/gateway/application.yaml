spring:
  application:
    name: gateway
  cloud:
    gateway:
      discovery.locator.enabled: true

      default-filters:
        - PrefixPath=/api/v1
      routes:
        - id: shopping_cart_service_route
          uri: lb://shopping-cart
          predicates:
            - Path=/shopping-cart/**

        - id: shopping_store_service_route
          uri: lb://shopping-store
          predicates:
            - Path=/shopping-store/**

        - id: warehouse_service_route
          uri: lb://warehouse
          predicates:
            - Path=/warehouse/**

        - id: payment_service_route
          uri: lb://payment
          predicates:
            - Path=/payment/**

        - id: delivery_service_route
          uri: lb://delivery
          predicates:
            - Path=/delivery/**

        - id: order_service_route
          uri: lb://order
          predicates:
            - Path=/order/**


server:
  port: 8080
